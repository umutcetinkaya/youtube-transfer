<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Transfer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      color: #fff;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 48px 0;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #ff0000 0%, #ff4444 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3);
    }

    header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #888;
      font-size: 16px;
    }

    /* Channels Grid */
    .channels-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 24px;
      margin-bottom: 32px;
      align-items: start;
    }

    .transfer-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 120px;
      color: #444;
      font-size: 32px;
    }

    /* Channel Card */
    .channel-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      transition: all 0.3s ease;
    }

    .channel-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .channel-card.source {
      background: linear-gradient(135deg, rgba(62, 166, 255, 0.05) 0%, rgba(62, 166, 255, 0.02) 100%);
    }

    .channel-card.dest {
      background: linear-gradient(135deg, rgba(46, 204, 113, 0.05) 0%, rgba(46, 204, 113, 0.02) 100%);
    }

    .channel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .channel-label {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .channel-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .channel-icon.source {
      background: linear-gradient(135deg, #3ea6ff 0%, #0066cc 100%);
    }

    .channel-icon.dest {
      background: linear-gradient(135deg, #2ecc71 0%, #1a9f4d 100%);
    }

    .channel-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    .channel-title.source { color: #3ea6ff; }
    .channel-title.dest { color: #2ecc71; }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.connected {
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }

    .status-badge.disconnected {
      background: rgba(255, 255, 255, 0.05);
      color: #666;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Channel Info */
    .channel-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .channel-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .channel-name {
      font-size: 15px;
      font-weight: 500;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(255, 0, 0, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255, 0, 0, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #888;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .btn-success {
      background: linear-gradient(135deg, #2ecc71 0%, #1a9f4d 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(46, 204, 113, 0.3);
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(46, 204, 113, 0.4);
    }

    .btn-download {
      background: linear-gradient(135deg, #3ea6ff 0%, #0066cc 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(62, 166, 255, 0.3);
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(62, 166, 255, 0.4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Video List */
    .video-list {
      max-height: 450px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .video-list::-webkit-scrollbar {
      width: 6px;
    }

    .video-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 3px;
    }

    .video-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .video-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .video-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid transparent;
      border-radius: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .video-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .video-item.selected {
      background: rgba(62, 166, 255, 0.1);
      border-color: rgba(62, 166, 255, 0.3);
    }

    .video-checkbox {
      width: 20px;
      height: 20px;
      accent-color: #3ea6ff;
      cursor: pointer;
    }

    .video-thumbnail {
      width: 100px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.05);
    }

    .video-info {
      flex: 1;
      min-width: 0;
    }

    .video-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
    }

    .shorts-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #ff0050 0%, #ff0080 100%);
      color: white;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .video-duration {
      color: #888;
    }

    .video-preview {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      border-radius: 8px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .video-preview:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #444;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* Action Panel */
    .action-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
    }

    .selection-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 15px;
      color: #888;
    }

    .selection-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 12px;
      background: linear-gradient(135deg, #3ea6ff 0%, #0066cc 100%);
      border-radius: 16px;
      font-weight: 700;
      color: white;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Progress */
    .progress-container {
      margin-top: 32px;
      display: none;
    }

    .progress-container.active {
      display: block;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3ea6ff, #2ecc71);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 14px;
      color: #888;
    }

    /* Loading Spinner */
    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3ea6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .channels-grid {
        grid-template-columns: 1fr;
      }

      .transfer-arrow {
        padding: 20px 0;
        transform: rotate(90deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">▶</div>
        <h1>YouTube Transfer</h1>
      </div>
      <p>Transfer videos between two YouTube channels</p>
    </header>

    <div class="channels-grid">
      <!-- Source Channel -->
      <div class="channel-card source">
        <div class="channel-header">
          <div class="channel-label">
            <div class="channel-icon source">📤</div>
            <span class="channel-title source">Source Channel</span>
          </div>
          <span id="source-status" class="status-badge disconnected">
            <span class="status-dot"></span>
            Not Connected
          </span>
        </div>

        <div id="source-info" class="channel-info" style="display:none;">
          <img id="source-avatar" class="channel-avatar" src="" alt="">
          <span id="source-name" class="channel-name"></span>
        </div>

        <div style="margin-bottom: 20px;">
          <button id="source-connect" class="btn btn-primary" onclick="connectChannel(1)">
            <span>🔗</span> Connect
          </button>
          <button id="source-disconnect" class="btn btn-secondary" onclick="disconnectChannel(1)" style="display:none;">
            Disconnect
          </button>
        </div>

        <div id="source-videos" class="video-list">
          <div class="empty-state">
            <div class="empty-state-icon">📹</div>
            <p>Connect source channel to view videos</p>
          </div>
        </div>
      </div>

      <!-- Transfer Arrow -->
      <div class="transfer-arrow">→</div>

      <!-- Destination Channel -->
      <div class="channel-card dest">
        <div class="channel-header">
          <div class="channel-label">
            <div class="channel-icon dest">📥</div>
            <span class="channel-title dest">Destination Channel</span>
          </div>
          <span id="dest-status" class="status-badge disconnected">
            <span class="status-dot"></span>
            Not Connected
          </span>
        </div>

        <div id="dest-info" class="channel-info" style="display:none;">
          <img id="dest-avatar" class="channel-avatar" src="" alt="">
          <span id="dest-name" class="channel-name"></span>
        </div>

        <div style="margin-bottom: 20px;">
          <button id="dest-connect" class="btn btn-primary" onclick="connectChannel(2)">
            <span>🔗</span> Connect
          </button>
          <button id="dest-disconnect" class="btn btn-secondary" onclick="disconnectChannel(2)" style="display:none;">
            Disconnect
          </button>
        </div>

        <div id="dest-videos" class="video-list">
          <div class="empty-state">
            <div class="empty-state-icon">☁️</div>
            <p>Transferred videos will appear here</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Panel -->
    <div class="action-panel">
      <div class="selection-info">
        <span class="selection-count" id="selected-count">0</span>
        <span>videos selected</span>
      </div>

      <div class="action-buttons">
        <button id="transfer-btn" class="btn btn-success" onclick="startTransfer()" disabled>
          <span>🚀</span> Transfer
        </button>
        <button id="download-btn" class="btn btn-download" onclick="downloadSelected()" disabled>
          <span>💾</span> Download Only
        </button>
        <button id="delete-btn" class="btn btn-danger" onclick="deleteSelected()" disabled>
          <span>🗑️</span> Delete from Source
        </button>
      </div>

      <div id="progress-container" class="progress-container">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        </div>
        <p id="progress-text" class="progress-text">Preparing...</p>
      </div>
    </div>
  </div>

  <script>
    // State
    let selectedVideos = new Set();
    let sourceVideos = [];

    // OAuth popup handlers
    window.authSuccess = function(channelNum) {
      updateAuthStatus();
    };

    window.authError = function(error) {
      alert('Connection error: ' + error);
    };

    // Connect channel
    function connectChannel(num) {
      const width = 600;
      const height = 700;
      const left = (window.innerWidth - width) / 2;
      const top = (window.innerHeight - height) / 2;
      window.open(`/auth/channel/${num}`, 'youtube-auth', `width=${width},height=${height},left=${left},top=${top}`);
    }

    // Disconnect channel
    async function disconnectChannel(num) {
      await fetch(`/auth/disconnect/${num}`, { method: 'POST' });
      updateAuthStatus();
    }

    // Update auth status
    async function updateAuthStatus() {
      try {
        const res = await fetch('/auth/status');
        const data = await res.json();

        // Source channel
        const sourceStatus = document.getElementById('source-status');
        const sourceConnect = document.getElementById('source-connect');
        const sourceDisconnect = document.getElementById('source-disconnect');
        const sourceInfo = document.getElementById('source-info');

        if (data.channel1.connected) {
          sourceStatus.innerHTML = '<span class="status-dot"></span> Connected';
          sourceStatus.className = 'status-badge connected';
          sourceConnect.style.display = 'none';
          sourceDisconnect.style.display = 'inline-flex';

          if (data.channel1.info) {
            sourceInfo.style.display = 'flex';
            document.getElementById('source-avatar').src = data.channel1.info.thumbnail || '';
            document.getElementById('source-name').textContent = data.channel1.info.title;
          }
          loadVideos(1);
        } else {
          sourceStatus.innerHTML = '<span class="status-dot"></span> Not Connected';
          sourceStatus.className = 'status-badge disconnected';
          sourceConnect.style.display = 'inline-flex';
          sourceDisconnect.style.display = 'none';
          sourceInfo.style.display = 'none';
          showEmptyState('source-videos', '📹', 'Connect source channel to view videos');
        }

        // Destination channel
        const destStatus = document.getElementById('dest-status');
        const destConnect = document.getElementById('dest-connect');
        const destDisconnect = document.getElementById('dest-disconnect');
        const destInfo = document.getElementById('dest-info');

        if (data.channel2.connected) {
          destStatus.innerHTML = '<span class="status-dot"></span> Connected';
          destStatus.className = 'status-badge connected';
          destConnect.style.display = 'none';
          destDisconnect.style.display = 'inline-flex';

          if (data.channel2.info) {
            destInfo.style.display = 'flex';
            document.getElementById('dest-avatar').src = data.channel2.info.thumbnail || '';
            document.getElementById('dest-name').textContent = data.channel2.info.title;
          }
          loadVideos(2);
        } else {
          destStatus.innerHTML = '<span class="status-dot"></span> Not Connected';
          destStatus.className = 'status-badge disconnected';
          destConnect.style.display = 'inline-flex';
          destDisconnect.style.display = 'none';
          destInfo.style.display = 'none';
          showEmptyState('dest-videos', '☁️', 'Transferred videos will appear here');
        }

        updateButtons();
      } catch (err) {
        console.error('Status error:', err);
      }
    }

    // Load videos
    async function loadVideos(channelNum) {
      const containerId = channelNum === 1 ? 'source-videos' : 'dest-videos';
      const container = document.getElementById(containerId);
      container.innerHTML = '<div class="empty-state"><div class="loading-spinner"></div><p style="margin-top:16px">Uploading...</p></div>';

      try {
        const res = await fetch(`/api/videos/${channelNum}`);
        const data = await res.json();

        if (data.videos && data.videos.length > 0) {
          if (channelNum === 1) {
            sourceVideos = data.videos;
            renderSourceVideos();
          } else {
            renderDestVideos(data.videos);
          }
        } else {
          const icon = channelNum === 1 ? '📹' : '☁️';
          const msg = channelNum === 1 ? 'No videos in this channel' : 'No videos in destination channel';
          showEmptyState(containerId, icon, msg);
        }
      } catch (err) {
        showEmptyState(containerId, '⚠️', 'Error loading videos');
      }
    }

    // Render source videos
    function renderSourceVideos() {
      const container = document.getElementById('source-videos');
      container.innerHTML = sourceVideos.map(video => `
        <div class="video-item ${selectedVideos.has(video.id) ? 'selected' : ''}" onclick="toggleVideo('${video.id}')">
          <input type="checkbox" class="video-checkbox" ${selectedVideos.has(video.id) ? 'checked' : ''} onclick="event.stopPropagation(); toggleVideo('${video.id}')">
          <img class="video-thumbnail" src="${video.thumbnail || ''}" alt="" onerror="this.style.background='rgba(255,255,255,0.05)'">
          <div class="video-info">
            <div class="video-title">${escapeHtml(video.title)}</div>
            <div class="video-meta">
              ${video.isShort ? '<span class="shorts-badge">⚡ Short</span>' : ''}
              <span class="video-duration">${formatDuration(video.duration)}</span>
              <span>•</span>
              <span>${formatDate(video.publishedAt)}</span>
            </div>
          </div>
          <button class="video-preview" onclick="event.stopPropagation(); previewVideo('${video.id}')">▶ Watch</button>
        </div>
      `).join('');
    }

    // Render dest videos
    function renderDestVideos(videos) {
      const container = document.getElementById('dest-videos');
      container.innerHTML = videos.map(video => `
        <div class="video-item">
          <img class="video-thumbnail" src="${video.thumbnail || ''}" alt="">
          <div class="video-info">
            <div class="video-title">${escapeHtml(video.title)}</div>
            <div class="video-meta">
              ${video.isShort ? '<span class="shorts-badge">⚡ Short</span>' : ''}
              <span>${formatDate(video.publishedAt)}</span>
            </div>
          </div>
          <button class="video-preview" onclick="previewVideo('${video.id}')">▶ Watch</button>
        </div>
      `).join('');
    }

    // Toggle video selection
    function toggleVideo(videoId) {
      if (selectedVideos.has(videoId)) {
        selectedVideos.delete(videoId);
      } else {
        selectedVideos.add(videoId);
      }
      renderSourceVideos();
      updateButtons();
    }

    // Update buttons
    function updateButtons() {
      const transferBtn = document.getElementById('transfer-btn');
      const downloadBtn = document.getElementById('download-btn');
      const deleteBtn = document.getElementById('delete-btn');
      const count = document.getElementById('selected-count');

      count.textContent = selectedVideos.size;

      fetch('/auth/status').then(res => res.json()).then(data => {
        transferBtn.disabled = selectedVideos.size === 0 || !data.channel1.connected || !data.channel2.connected;
        downloadBtn.disabled = selectedVideos.size === 0 || !data.channel1.connected;
        deleteBtn.disabled = selectedVideos.size === 0 || !data.channel1.connected;
      });
    }

    // Start transfer
    async function startTransfer() {
      if (selectedVideos.size === 0) return;

      const progressContainer = document.getElementById('progress-container');
      const progressFill = document.getElementById('progress-fill');
      const progressText = document.getElementById('progress-text');

      document.querySelectorAll('.action-buttons .btn').forEach(b => b.disabled = true);
      progressContainer.classList.add('active');
      progressText.style.color = '#888';

      const videoIds = Array.from(selectedVideos);

      for (const videoId of videoIds) {
        const video = sourceVideos.find(v => v.id === videoId);
        const label = video?.isShort ? ' (Short)' : '';

        try {
          const res = await fetch('/api/transfer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ videoId, isShort: video?.isShort || false })
          });

          const { transferId } = await res.json();

          await pollProgress(transferId, (status, progress) => {
            const statusText = {
              'starting': '🚀 Starting',
              'fetching_metadata': '📋 Fetching metadata',
              'downloading': '⬇️ Downloading',
              'uploading': '⬆️ Uploading',
              'deleting_source': '🗑️ Deleting',
              'completed': '✅ Completed'
            };
            progressText.textContent = `${video?.title || videoId}${label}: ${statusText[status] || status}`;
            progressFill.style.width = `${progress}%`;
          });

          selectedVideos.delete(videoId);
        } catch (err) {
          progressText.textContent = `❌ Hata: ${err.message}`;
          progressText.style.color = '#e74c3c';
          if (err.message.includes('exceeded')) break;
        }
      }

      await loadVideos(1);
      await loadVideos(2);
      selectedVideos.clear();
      renderSourceVideos();
      updateButtons();

      setTimeout(() => {
        progressContainer.classList.remove('active');
      }, 2000);
    }

    // Download selected
    async function downloadSelected() {
      if (selectedVideos.size === 0) return;

      const progressContainer = document.getElementById('progress-container');
      const progressFill = document.getElementById('progress-fill');
      const progressText = document.getElementById('progress-text');

      document.querySelectorAll('.action-buttons .btn').forEach(b => b.disabled = true);
      progressContainer.classList.add('active');

      const videoIds = Array.from(selectedVideos);

      for (const videoId of videoIds) {
        const video = sourceVideos.find(v => v.id === videoId);

        try {
          const res = await fetch('/api/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ videoId, isShort: video?.isShort || false })
          });

          const { downloadId } = await res.json();

          await pollDownload(downloadId, (status, progress) => {
            progressText.textContent = `💾 ${video?.title || videoId}: ${status === 'downloading' ? 'Downloading' : status}`;
            progressFill.style.width = `${progress}%`;
          });
        } catch (err) {
          progressText.textContent = `❌ ${err.message}`;
        }
      }

      progressText.textContent = '✅ Download complete! ~/Downloads/youtube-transfer/';
      progressText.style.color = '#2ecc71';
      updateButtons();

      setTimeout(() => progressContainer.classList.remove('active'), 3000);
    }

    // Delete selected
    async function deleteSelected() {
      if (selectedVideos.size === 0) return;
      if (!confirm(`Delete ${selectedVideos.size} videos? This cannot be undone.`)) return;

      const progressContainer = document.getElementById('progress-container');
      const progressFill = document.getElementById('progress-fill');
      const progressText = document.getElementById('progress-text');

      document.querySelectorAll('.action-buttons .btn').forEach(b => b.disabled = true);
      progressContainer.classList.add('active');

      const videoIds = Array.from(selectedVideos);
      let done = 0;

      for (const videoId of videoIds) {
        const video = sourceVideos.find(v => v.id === videoId);
        progressText.textContent = `🗑️ ${video?.title || videoId} deleting...`;
        progressFill.style.width = `${(done / videoIds.length) * 100}%`;

        try {
          await fetch(`/api/video/1/${videoId}`, { method: 'DELETE' });
          done++;
          selectedVideos.delete(videoId);
        } catch (err) {}
      }

      progressFill.style.width = '100%';
      progressText.textContent = `✅ ${done} videos deleted`;
      progressText.style.color = '#2ecc71';

      await loadVideos(1);
      selectedVideos.clear();
      updateButtons();

      setTimeout(() => progressContainer.classList.remove('active'), 2000);
    }

    // Poll progress
    function pollProgress(transferId, onProgress) {
      return new Promise((resolve, reject) => {
        const poll = async () => {
          const res = await fetch(`/api/transfer/${transferId}`);
          const data = await res.json();
          onProgress(data.status, data.progress || 0);
          if (data.status === 'completed') resolve(data);
          else if (data.status === 'error') reject(new Error(data.error));
          else setTimeout(poll, 1000);
        };
        poll();
      });
    }

    function pollDownload(downloadId, onProgress) {
      return new Promise((resolve, reject) => {
        const poll = async () => {
          const res = await fetch(`/api/download/${downloadId}`);
          const data = await res.json();
          onProgress(data.status, data.progress || 0);
          if (data.status === 'completed') resolve(data);
          else if (data.status === 'error') reject(new Error(data.error));
          else setTimeout(poll, 500);
        };
        poll();
      });
    }

    function previewVideo(videoId) {
      window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
    }

    function showEmptyState(containerId, icon, message) {
      document.getElementById(containerId).innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">${icon}</div>
          <p>${message}</p>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatDuration(seconds) {
      if (!seconds) return '';
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m === 0 ? `${s}s` : `${m}:${s.toString().padStart(2, '0')}`;
    }

    // Init
    updateAuthStatus();
  </script>
</body>
</html>
